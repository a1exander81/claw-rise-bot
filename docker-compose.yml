version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claw-rise-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./generated-cards:/app/generated-cards
    ports:
      - "8080:8080"  # health endpoint
    depends_on:
      - redis
    command: >
      sh -c "
        python -m src.health.monitor &
        python -m src.bot.executor
      "

  webui:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: claw-rise-webui
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - bot

  redis:
    image: redis:7-alpine
    container_name: claw-rise-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  redis_data:
