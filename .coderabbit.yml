# CodeRabbit Configuration for Claw_Rise_bot
# https://coderabbit.ai

review:
  auto_title: true
  auto_approvals: false  # Manual approval required before merge
  comments:
    require_changes: false  # Can approve if no changes needed
  labels:
    - "ai-reviewed"
    - "trading-bot"
  ignore:
    - "*.md"
    - "*.json"
    - ".env*"
    - "Dockerfile"
    - "docker-compose*.yml"
    - "requirements.txt"
    - "scripts/*"

bot:
  ignore_minor: true  # Skip trivial formatting changes
  security_scan: true
  summary: true

instructions: |
  Review this PR for Claw_Rise_bot — a 5M crypto scalper on BingX.
  
  CRITICAL CHECKS:
  1. Risk management: verify stoploss, trailing, position sizing logic
  2. API key handling: ensure no secrets hardcoded or logged
  3. Telegram UX: maintain 0-Type (no typing) consistency
  4. BingX API: correct endpoint usage, rate limit handling, error recovery
  5. No breaking changes to config schema (.env structure)
  
  Flag any:
  - Hardcoded values that should be configurable
  - Missing error handling (especially network/API calls)
  - Race conditions in trade execution or state updates
  - Changes to risk parameters that could increase exposure
  - Logging that might leak sensitive data
  
  This bot trades real money. Review accordingly.
